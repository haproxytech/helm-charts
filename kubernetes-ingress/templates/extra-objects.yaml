{{- if or .Values.extraManifests .Values.extraTemplates }}
{{- $objBase := fromYaml (include "kubernetes-ingress.extraObjectLabels" .) -}}
{{- range .Values.extraManifests }}
{{- $obj := . -}}
{{- include "kubernetes-ingress.validateExtraObject" $obj }}
---
{{ toYaml (merge $obj $objBase) }}
{{- end }}
{{- range .Values.extraTemplates }}
{{- $obj := fromYaml (tpl . $) -}}
{{- include "kubernetes-ingress.validateExtraObject" $obj }}
---
{{ toYaml (merge $obj $objBase) }}
{{- end }}
{{- end }}
