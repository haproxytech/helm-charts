## Test: pod scheduling knobs (nodeSelector, tolerations, affinity,
## topologySpreadConstraints). Exercises the four scheduling `{{- with }}`
## blocks in _podspec.tpl. All constraints are intentionally soft/satisfiable
## so the pod still schedules on a single-node Kind cluster:
##   - nodeSelector targets a label every node has (kubernetes.io/os=linux)
##   - affinity uses preferredDuringScheduling (never blocks scheduling)
##   - topologySpreadConstraints uses whenUnsatisfiable: ScheduleAnyway
controller:
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: haproxy-unified-gateway
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: haproxy-unified-gateway
