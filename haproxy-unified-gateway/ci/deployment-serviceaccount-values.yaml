## Test: ServiceAccount with a custom name and annotations.
## Exercises the serviceAccount.name override (consumed by the
## serviceAccountName helper across pod spec, RBAC bindings and jobs) and the
## annotations block in controller-serviceaccount.yaml.
serviceAccount:
  create: true
  name: custom-hug-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/hug-role
